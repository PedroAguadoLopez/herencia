<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Combate RPG</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Arena de Combate</h1>
        <div class="battlefield">
            <div id="player-stats" class="card hero-card"></div>
            <div id="enemy-stats" class="card enemy-card"></div>
        </div>
        <div class="controls">
            <button id="btn-attack">Ataque Básico</button>
            <button id="btn-ability">Habilidad Especial</button>
        </div>
        <div id="log" class="log-box"></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
